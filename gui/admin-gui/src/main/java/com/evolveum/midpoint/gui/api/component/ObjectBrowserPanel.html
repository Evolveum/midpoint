<wicket:panel xmlns:wicket="http://wicket.apache.org">

    <div wicket:id="warningMessage"/>
    <div class="d-flex align-items-center gap-2 search-form">

        <div wicket:id="typePanel" class="mb-3">
            <label class="form-label"><wicket:message key="roleMemberPanel.type" /></label>
            <select class="form-select form-select-sm" wicket:id="type" />
        </div>
    </div>

    <div wicket:id="table" style="margin: 5px;"></div>
    <div class="center">
        <a class="btn btn-sm btn-primary"  wicket:id="addButton"/>
        <a class="btn btn-sm btn-light border"  wicket:id="cancelButton"/>
    </div>
</wicket:panel>

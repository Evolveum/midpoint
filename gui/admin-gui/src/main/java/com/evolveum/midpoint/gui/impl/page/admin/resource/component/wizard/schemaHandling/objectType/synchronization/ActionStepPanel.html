<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>
    <div wicket:id="feedbackContainer" class="col-8 feedbackContainer">
        <div wicket:id="feedback" class="messagePanel"/>
    </div>
    <div class="col-8" wicket:id="container">
        <div class="p-2 ps-3 pe-3 card shadow-sm btn" wicket:id="header">
            <div class="row">
                <span>
                    <i class="fa fa-wrench"></i>
                    <span style="text-decoration: none;">
                <wicket:message key="PageResource.wizard.step.synchronization.reaction.action"/>
            </span>
                </span>
                <button wicket:id="expandCollapseButton" wicket:message="title:PrismObjectPanel.expandCollapseContainer" class="btn btn-tool text-body ms-auto" trigger="hover"></button>
            </div>
        </div>
        <div class="card shadow-sm mb-3 border-top">
            <div class="p-3 mb-0" wicket:id="actionContainer">
                <span class="mt-4 text-secondary fw-bold text-center">
                    <span style="text-decoration: none;">
                        <wicket:message key="SynchronizationReactionType.actions"/>
                    </span>
                </span>
                <div wicket:id="action"/>
            </div>
            <div wicket:id="panel"/>
        </div>
    </div>
</wicket:extend>
</html>

<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div wicket:id="lifecycleState" class="ms-auto p-0"/>
    <wicket:enclosure child="icon">
        <div class="logo d-flex justify-content-center mt-3">
            <i class="text-info align-self-center fa-2x" wicket:id="icon"/>
        </div>
    </wicket:enclosure>
    <div class="d-flex justify-content-center">
        <span class="mt-3 text-secondary fw-bold text-center text-break" wicket:id="title"/>
        <i wicket:id="help" class="ps-1 pt-3"/>
    </div>
    <span class="mb-2 text-secondary text-center tile-description" wicket:id="description"/>
    <span class="invisible" wicket:id="tag"/>
    <div class="mt-auto d-flex flex-column w-100">
        <button class="btn btn-light border mb-3" wicket:id="configureButton"/>
        <wicket:enclosure child="removeButton">
            <div class="d-grid">
                <button class="btn btn-outline-secondary" style="border:none;" wicket:id="removeButton"/>
            </div>
        </wicket:enclosure>
    </div>
</wicket:panel>
</html>

<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <wicket:container wicket:id="contentContainer"></wicket:container>

    <wicket:fragment wicket:id="columnTileFragment">
        <div class="col-12 d-flex flex-row flex-wrap align-items-center py-1 px-3">
            <div wicket:id="tile-column-header" class="tile-column-header">
                <wicket:container wicket:id="toolbar"></wicket:container>
            </div>

            <div class="px-0 tile-column-icon" wicket:id="separator"></div>
            <div class="col-6 d-flex p-0" wicket:id="headerTitle"></div>
            <div class="px-0 tile-column-icon" wicket:id="separatorSecond"></div>
            <div class="col-2" wicket:id="targetRef"></div>
            <div class="ml-auto" wicket:id="showSuggestionLink"></div>
            <div class="ml-auto" wicket:id="acceptSelectedButton"></div>
            <div wicket:id="actions"></div>
        </div>

        <div wicket:id="rowsContainer" class="col-12 d-flex flex-column p-3 border-top bg-light">

            <div class="py-2" wicket:id="columnHeader"></div>

            <div wicket:id="radioGroup">

                <wicket:container wicket:id="rows">
                    <div wicket:id="rowWrapper">
                        <div wicket:id="row"></div>
                    </div>
                </wicket:container>
            </div>
            <div wicket:id="note" class="d-flex align-items-center text-info px-2">
                <i class="fa fa-info-circle mr-2"></i>
                <span wicket:id="noteLabel"></span>
            </div>
        </div>
    </wicket:fragment>
    <wicket:fragment wicket:id="toolbarFragment">
        <span class="align-self-center" wicket:id="item"></span>
    </wicket:fragment>

    <wicket:fragment wicket:id="headerTitleFragment">
        <span wicket:id="text" class="align-self-center d-flex align-items-center"></span>
        <span wicket:id="badge" class="align-self-center ml-2 badge badge-ai-gradient badge-opaque" style="height: fit-content;"></span>
    </wicket:fragment>
</wicket:panel>
</html>

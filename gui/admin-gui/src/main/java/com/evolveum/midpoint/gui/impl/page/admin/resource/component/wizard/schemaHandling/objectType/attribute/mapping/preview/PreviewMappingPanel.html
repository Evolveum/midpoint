<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="d-flex flex-column h-100">
        <div class="mb-4">
            <div class="d-flex align-items-center flex-wrap">
                <span class="fa fa-retweet text-muted me-2"></span>
                <span class="fw-semibold me-2">
                    <wicket:message key="PreviewMappingPanel.mappingName"/>
                </span>
                <span wicket:id="mappingName"
                        class="badge badge-light px-3 py-2 border"
                        style="font-size:14px !important; font-weight:500 !important"></span>
            </div>
        </div>

        <div wicket:id="mappingCardPanel"></div>

        <div wicket:id="expressionPanel" class="mt-2"></div>

        <div wicket:id="conditionPanel" class="mt-2 border-top"></div>
    </div>

    <wicket:fragment wicket:id="buttons">
        <div class="d-flex flex-wrap align-items-center gap-3 w-100">
            <div wicket:id="repeater"></div>
        </div>
    </wicket:fragment>

</wicket:panel>
</html>

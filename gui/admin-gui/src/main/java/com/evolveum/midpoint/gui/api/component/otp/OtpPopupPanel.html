<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>

    <form wicket:id="form">
        <div wicket:id="otp"/>
    </form>

    <wicket:fragment wicket:id="footerButtons">
        <div class="d-flex justify-content-between w-100">
            <a wicket:id="cancel" class="btn btn-link">
                <wicket:message key="OtpPopupPanel.cancel"/>
            </a>
            <a class="btn btn-primary" wicket:id="confirm"/>
        </div>
    </wicket:fragment>
</wicket:panel>
</body>
</html>

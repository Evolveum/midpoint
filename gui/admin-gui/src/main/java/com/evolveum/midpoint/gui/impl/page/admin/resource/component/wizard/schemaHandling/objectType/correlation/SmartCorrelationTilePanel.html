<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>

    <wicket:fragment wicket:id="generatingTileFragment">
        <div class="card-body d-flex flex-column justify-content-center align-items-center text-center h-100">
            <div wicket:id="generationPanel"></div>
        </div>
    </wicket:fragment>

    <wicket:fragment wicket:id="basicTileFragment">

        <div class="d-flex flex-row align-items-center py-3 px-2">

            <div class="col">
                <div class="d-flex align-items-start gap-3">

                    <div class="form-check mt-1">
                        <input type="checkbox"
                                wicket:id="selectCheckbox"
                                class="form-check-input"/>
                    </div>

                    <div>
                        <div class="d-flex align-items-center gap-2">
                            <h5 wicket:id="title" class="mb-0"></h5>
                            <span wicket:id="badgePanel"></span>
                        </div>

                        <p wicket:id="description"
                                class="text-muted mb-0 mt-2"></p>
                    </div>

                </div>
            </div>

            <div class="col-md-6">
                <div class="d-flex flex-wrap justify-content-end align-items-center gap-5 pe-3">

                    <div wicket:id="statsPanel" class="text-center">
                        <div wicket:id="statsPanelValue"></div>
                        <small wicket:id="statsPanelLabel" class="text-muted"></small>
                    </div>

                    <div wicket:id="statePanel" class="d-flex flex-row p-2 info-badge "></div>

                    <a href="#" wicket:id="viewRuleLink"></a>

                    <div wicket:id="moreAction"></div>

                </div>
            </div>

        </div>

            <div class="d-flex flex-row px-3 py-2 border-top">
                <div class="d-flex align-items-center gap-2 flex-wrap">
                    <span class="text-muted fw-bold">
                        <wicket:message key="SmartCorrelationTilePanel.attributes"></wicket:message>
                    </span>
                    <div wicket:id="correlationItemsPanel"></div>
                </div>
        </div>

    </wicket:fragment>

<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>

    <div class="d-flex gap-2 d-flex gap-2 flex-wrap">

        <div wicket:id="correlationItemsPanel"
                class="d-inline-flex align-items-center border border-2 rounded overflow-hidden">

            <div class="px-3 py-1"

            <div class="border-left px-3 py-1 fw-bold  text-secondary bg-light"
                    wicket:id="correlationItemsPanelLabel"></div>

        </div>
    </div>

</wicket:panel>

<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>

    <div wicket:id="tileContent" class="px-4 py-3 d-flex h-100 align-items-center" style="min-height:110px;">

        <input type="checkbox" wicket:id="selectCheckbox" style="transform: scale(1.2);"/>

        <div class="d-flex align-items-center px-3 col-3">
            <div class="text-start">
                <h6 wicket:id="name" class="text-wrap m-0"></h6>
                <div wicket:id="tag"></div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center w-100">

        <div class="d-flex w-100 gap-3">
            <!-- SUBJECT block -->
            <div class="text-start">
                <div class="text-uppercase small text-muted fw-bold">Subject</div>
                <div wicket:id="subjectName" class="fw-semibold text-break"></div>
                <div wicket:id="subjectObjectClass" class="border rounded text-muted border px-2 text-center text-sm d-inline-flex"></div>
            </div>

            <!-- Flow arrow -->
            <div class="flex-grow-1 pr-2 d-flex align-items-center justify-content-center">
                <div class="flow-arrow-container" style="min-width: 30px;">
                    <div class="flow-arrow"></div>
                    <div class="arrow-text" wicket:id="arrowTextLine">
                        <span wicket:id="arrowTextLineLabel"></span><br/>
                        <span wicket:id="arrowTextLineValue" class="fw-bold"></span>
                    </div>
                </div>
            </div>

            <!-- OBJECT block -->
            <div class="text-start">
                <div class="text-uppercase small text-muted fw-bold">Object</div>
                <div wicket:id="objectName" class="fw-semibold text-break" style="min-width:0px;"></div>
                <div wicket:id="objectObjectClass" class="border rounded text-muted border px-2 text-center text-sm d-inline-flex"></div>
            </div>
        </div>

            <!-- Action buttons -->
            <div class="d-flex justify-content-end col-4 gap-2 align-items-center">
                <div wicket:id="accept" class="btn btn-sm btn-outline-primary me-2 gap-2 text-nowrap"></div>
                <div wicket:id="dismiss" class="btn btn-sm btn-link link-danger me-2 gap-2 text-nowrap"></div>
                <div wicket:id="lifecycleState" class="text-nowrap"></div>
                <div wicket:id="edit" class="btn btn-sm btn-outline-primary me-2 gap-2 text-nowrap"></div>
            </div>

            <div wicket:id="details" class="btn btn-sm btn-link d-flex align-items-center flex-row-reverse text-nowrap gap-2"></div>

        </div>
    </div>

    <div wicket:id="detailsPanel" class="border-top"></div>


</wicket:panel>
</html>

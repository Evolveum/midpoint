<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="d-flex flex-row p-3 w-100 align-items-center rounded z-1">
        <div class="h-100 m-auto pr-3">
            <div wicket:id="check"/>
        </div>
        <div class="h-100 m-auto pr-3">
            <i wicket:id="icon"></i>
        </div>
        <div class="w-100 d-flex flex-column" wicket:id="clickableArea">
            <div class="d-flex flex-row gap-2">
                <div class="d-inline" wicket:id="title"></div>
                <div class="d-flex align-self-center">
                    <div class="badge badge-ai badge-opaque" wicket:id="aiTag">
                        <i class="fa fa-wand-magic-sparkles fa-xs"></i>
                        AI
                    </div>
                </div>
            </div>
            <div class="text-secondary" wicket:id="description"/>
            <div class="text-sm text-secondary mt-1" wicket:id="uri"/>
        </div>
        <div class="d-flex gap-1">
            <a class="btn btn-link text-secondary" wicket:id="showDetails">
                <i class="fa fa-eye"></i>
            </a>
            <a class="btn btn-link text-danger" wicket:id="delete">
                <i class="fa fa-trash"></i>
            </a>
        </div>
    </div>
</wicket:panel>
</html>

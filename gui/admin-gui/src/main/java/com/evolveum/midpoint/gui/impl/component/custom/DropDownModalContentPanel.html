<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <div class="dropdown">
        <div wicket:id="toggle"
                class="font-weight-semibold"
                data-toggle="dropdown"
                href="#">
            <span wicket:id="label"></span>
        </div>

        <div wicket:id="contentContainer"
                class="dropdown-menu dropdown-menu-lg shadow p-0 simulation-dropdown-content"
                onclick="event.stopPropagation();">

            <div class="modal-content">
                <wicket:enclosure child="title">
                    <div class="modal-header justify-content-between align-items-center m-0 h5 px-3 py-2" role="heading">
                        <div class="d-flex align-items-center flex-grow-1 w-100">
                            <i class="mr-2 modal-title" wicket:id="titleIcon"></i>
                            <div class="modal-title align-self-center w-100" wicket:id="title"></div>
                        </div>

                        <button wicket:id="close" type="button"
                                class="close"
                                aria-label="Close"
                                style="position: absolute; right: 12px; top: 8px;"
                                onclick="$(this).closest('.dropdown').find('[data-toggle=dropdown]').dropdown('toggle');">
                            <span aria-hidden="true">&times;</span>
                        </button>
                    </div>
                </wicket:enclosure>

                <div class="modal-body p-2">
                    <wicket:child/>
                </div>

                <div class="modal-footer py-2" wicket:id="footer"></div>
            </div>

        </div>
    </div>
</wicket:panel>
</body>
</html>

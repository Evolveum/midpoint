<!DOCTYPE html>

<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <div class="d-flex w-100 justify-content-between">
        <h5>
            <div class="m-0 fw-semibold" wicket:id="title"></div>
        </h5>
        <div class="text-center" style="font-size: 20px">
            <span wicket:id="statusBox"></span>
        </div>
    </div>

    <div wicket:id="subtitle"></div>

    <div class="d-flex w-100 justify-content-between text-muted mt-2">
        <span wicket:id="timeLabel"></span>
        <span wicket:id="progressLabel"></span>
    </div>

    <div class="progress w-100 rounded mt-1">
        <div wicket:id="progressBar"
                role="progressbar"
                aria-valuenow="100"
                aria-valuemin="0"
                aria-valuemax="100"
                style="width: 100%">
        </div>
    </div>
</wicket:panel>

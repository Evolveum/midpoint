<wicket:panel xmlns:wicket="http://wicket.apache.org">
    <p class="text-muted mb-3" style="white-space: pre-line;" wicket:id="subtitle"></p>

    <span wicket:id="infoMessage"></span>

    <div wicket:id="errorMessage" class="alert alert-danger alert-opaque d-flex align-items-center gap-2 mt-2 py-2 px-3">
        <i class="fa fa-exclamation-circle"></i>
        <span wicket:id="errorText"></span>
    </div>

    <div wicket:id="warningMessage" class="alert alert-warning alert-opaque d-flex align-items-center gap-2 mt-2 py-2 px-3">
        <i class="fa fa-exclamation-triangle"></i>
        <span wicket:id="warningText"></span>
    </div>

    <div class="d-flex align-items-center border rounded p-2 m-2 gap-2" wicket:id="infoDetails">

        <div class="bg-light rounded d-flex align-items-center justify-content-center p-2">
            <i class="fa fa-microchip fa-2x text-body-secondary"></i>
        </div>

        <div class="flex-grow-1">
            <div class="fw-semibold" wicket:id="aiProvider"></div>
            <div class="text-muted" wicket:id="aiModel"></div>
        </div>

        <div class="d-flex align-items-center fw-semibold me-3" wicket:id="aiStatusContainer">
            <i class="fa fa-circle mr-1" style="font-size:.6rem;"></i>
            <span wicket:id="aiStatus"></span>
        </div>
    </div>


    <form wicket:id="form">
        <div wicket:id="requestContainer" class="p-2">
            <div class="fw-semibold mb-2" wicket:id="requestLabel"></div>

            <div class="border rounded">
                <div wicket:id="listView" style="max-height: 300px; overflow-y: auto;">
                    <div class="d-flex align-items-center gap-2 py-2 px-2">
                        <input type="checkbox" class="m-1" wicket:id="check"/>

                        <div class="d-flex flex-column">
                            <div class="fw-semibold" wicket:id="title"></div>
                            <div class="text-muted small" wicket:id="description"></div>
                        </div>

                        <a class="btn btn-link btn-sm ml-auto" wicket:id="action"></a>
                    </div>
                </div>
            </div>
        </div>
    </form>
</wicket:panel>

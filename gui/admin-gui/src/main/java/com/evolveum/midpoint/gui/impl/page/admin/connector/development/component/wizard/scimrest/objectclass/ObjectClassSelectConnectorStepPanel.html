<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>
    <div class="col-12">
        <div class="d-flex flex-row flex-wrap alert alert-info alert-opaque px-3">
            <span class="d-flex py-2 pe-2 align-items-start alert-icon">
                <i class="fa fa fa-info-circle"></i>
            </span>
            <div class="d-flex flex-column justify-content-center align-items-start">
                <div class="fw-bold">
                    <wicket:message key="ObjectClassSelectConnectorStepPanel.ai.found.title"/>
                </div>
                <div>
                    <wicket:message key="ObjectClassSelectConnectorStepPanel.ai.found.description"/>.
                </div>
            </div>
        </div>
    </div>
    <div wicket:id="feedbackContainer" class="col-12 feedbackContainer">
        <div wicket:id="feedback" class="messagePanel"/>
    </div>
    <div class="d-flex flex-row col-12 pb-2">
        <div class="me-auto">
            <wicket:message key="ObjectClassSelectConnectorStepPanel.title"/>
        </div>
        <a class="ms-auto btn btn-light border rounded-0" wicket:id="moreObjectClassesButton"/>
    </div>
    <div class="d-flex flex-wrap w-100" wicket:id="radioGroup">
        <div class="flex-fill p-1" wicket:id="panel">
            <div class="d-flex flex-row card mb-0 p-2 h-100">
                <div class="d-flex flex-column justify-content-center h-100 m-auto pe-3">
                    <input wicket:id="radio" type="radio"/>
                </div>
                <div class="w-100 d-flex flex-column">
                    <div class="d-lex flex-row">
                        <div class="d-inline" wicket:id="name"/>
                    </div>
                    <div class="clamp-2-lines text-secondary" wicket:id="description"/>
                </div>
            </div>
        </div>
    </div>
</wicket:extend>
</html>

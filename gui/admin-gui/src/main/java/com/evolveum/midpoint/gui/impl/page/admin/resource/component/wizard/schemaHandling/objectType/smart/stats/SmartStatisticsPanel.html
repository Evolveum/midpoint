<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>

    <div class="d-flex align-items-start" style="height: 80vh; overflow: hidden;">
        <div class="border d-flex flex-column"
                style="min-width:300px; width:300px; height:100%;"
                wicket:id="leftPanelContainer">

            <div wicket:id="chipsContainer" class="d-flex align-items-center justify-content-between p-3">
                <div wicket:id="totalObjects"></div>
                <div wicket:id="coverage"></div>
            </div>

            <hr class="m-0"/>

            <div class="p-3" wicket:id="searchContainer"></div>

            <hr class="m-0"/>

            <div class="w-100 p-2 bg-white d-flex flex-column align-items-start flex-grow-1"
                    style="overflow-y: auto; min-height: 0;">

                <div class="w-100" wicket:id="listViewContainer">
                    <button wicket:id="listView" type="button"
                            class="btn-light d-flex flex-column gap-2 w-100 p-2 mt-1
                            border-right-0 border-top-0 border-bottom-0 border-3">
                        <div class="d-flex flex-column align-items-start py-1">
                            <span wicket:id="text" class="text-primary fw-semibold text-truncate"></span>
                            <span wicket:id="subText" class="text-muted small"></span>
                        </div>
                    </button>
                </div>
                <div class="w-100 p-2 border-top flex-shrink-0">
                    <button wicket:id="showAllButton" class="btn btn-outline-primary w-100"></button>
                </div>
            </div>
        </div>

        <div wicket:id="mainPanelContainer"
                class="col p-3 d-flex flex-column"
                style="height:100%; min-width:0; overflow:hidden;">

            <div class="d-flex align-items-center gap-3 mb-5 mt-2">
                <div wicket:id="widgetsContainer"
                        class="flex-fill bg-light p-3 rounded d-flex align-items-center flex-column"></div>
            </div>


                <div class="d-flex flex-column flex-grow-1"  style="min-height:0;"wicket:id="tabPanel"></div>
        </div>

    </div>

    <wicket:fragment wicket:id="searchContainer">
        <div class="d-flex align-items-center gap-2">
            <div class="input-group flex-grow-1">
                <div class="input-group-prepend">
                    <span class="input-group-text bg-white border-right-0">
                        <i class="fa fa-search text-muted"></i>
                    </span>
                </div>
                <input type="text" wicket:id="searchInput" class="form-control"/>
            </div>

            <button type="button" wicket:id="sortToggle" class="btn btn-outline-secondary"></button>
        </div>
    </wicket:fragment>

    <wicket:fragment wicket:id="tableFragment">
        <div class="d-flex flex-column flex-grow-1 mb-1 border rounded-bottom" style="min-height:0;">
            <div wicket:id="table" class="d-flex flex-column m-0" style="min-height:0;"></div>
        </div>
    </wicket:fragment>

    <wicket:fragment wicket:id="footerButtons">
        <div class="d-flex justify-content-start w-100 align-items-center gap-3">
            <button type="button" wicket:id="closeButton" class="btn btn-link"></button>
            <div class="text-muted small ml-auto" wicket:id="timestamp"></div>
            <div wicket:id="recreateButton"></div>
        </div>
    </wicket:fragment>

    <wicket:fragment wicket:id="title">
        <div class="d-flex align-items-center gap-2 w-100">
            <div class="h5 m-0" wicket:id="primaryTitle"></div>
            <a wicket:id="closeButton" class="ml-auto text-muted mr-2" href="#" aria-label="Close">
                <i class="fa fa-times"></i>
            </a>
        </div>
    </wicket:fragment>
</wicket:panel>
</html>

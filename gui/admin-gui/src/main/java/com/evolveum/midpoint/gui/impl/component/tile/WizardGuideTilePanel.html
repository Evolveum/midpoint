<!DOCTYPE html>

<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="d-flex flex-row w-100 justify-content-between mb-3" style="height:20px">
        <span class="tile-badge" wicket:id="badge"></span>
        <i class="tile-lock text-secondary" wicket:id="lock"></i>
    </div>
    <i class="m-1 text-lightblue" wicket:id="icon"></i>
    <h5 class="tile-title text-capitalize mt-3 text-center font-weight-semibold text-dark" wicket:id="title"></h5>
    <div class="mt-1 text-center text-secondary small" wicket:id="description"></div>
</wicket:panel>
</html>

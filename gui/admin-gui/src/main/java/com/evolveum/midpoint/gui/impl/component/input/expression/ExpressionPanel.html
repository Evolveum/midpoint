<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <wicket:enclosure child="typeChoice">
        <div class="input-group has-validation">
            <div class="form-control" style="height: calc(1.8125rem + 2px);" wicket:id="typeChoice"></div>
            <button class="ps-2 btn btn-sm btn-primary" wicket:id="typeButton"></button>
            <div class="invalid-feedback">
                <wicket:message key="ExpressionPanel.invalidMessage"></wicket:message>
            </div>
            <div class="info-feedback">
                <wicket:message key="ExpressionPanel.infoMessage"></wicket:message>
            </div>
        </div>
    </wicket:enclosure>

    <div wicket:id="infoContainer" class="d-flex">
        <span class="text-info" wicket:id="infoLabel"></span>
        <span class="btn btn-tool mt-0 p-0">
            <i class="p-1" wicket:id="infoIcon"></i>
        </span>
        <div class="ms-auto">
            <button class="ms-auto btn btn-sm btn-primary" wicket:id="resetButton">
                <wicket:message key="ExpressionPanel.resetButton"/>
            </button>
        </div>
    </div>

    <div wicket:id="evaluatorPanel"></div>
</wicket:panel>
</html>

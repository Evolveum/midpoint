<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>

    <wicket:extend>

        <div class="container-fluid" style="max-height:150px; overflow-y: scroll;">
            <div class="row">
                <div class="col-md-4">
                    <div wicket:id="removedValues">
                        <div wicket:id="value" class="mb-2"></div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div wicket:id="addedValues">
                        <div wicket:id="value" class="mb-2 simulation-value-pill"></div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div wicket:id="unchangedValues">
                        <div wicket:id="value" class="mb-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <wicket:fragment wicket:id="countFragment">
            <div class="text-center text-muted m-0 mx-auto" wicket:id="count"></div>
        </wicket:fragment>

        <wicket:fragment wicket:id="titleFragment">
            <div class="w-100">
                <div class="row text-uppercase small font-weight-semibold">
                    <div class="col-md-4">
                        <wicket:message key="SimulationChangeDetailsPopupPanel.deletedValues"/>
                    </div>
                    <div class="col-md-4">
                        <wicket:message key="SimulationChangeDetailsPopupPanel.addedValues"/>
                    </div>
                    <div class="col-md-4">
                        <wicket:message key="SimulationChangeDetailsPopupPanel.unmodifiedValues"/>
                    </div>
                </div>
            </div>
        </wicket:fragment>
    </wicket:extend>
</wicket:panel>
</body>
</html>

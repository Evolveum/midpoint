<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="visually-hidden" wicket:id="panelStatus" aria-live="polite"/>
    <div class="property-stripe" wicket:id="localizedValueContainer">
        <div class="col-3" wicket:id="localizedValueLabel"/>
        <div wicket:id="localizedValueWithButtonContainer">
            <div wicket:id="localizedValueWithButton" class="input-group input-group-sm">
                <wicket:container wicket:id="localizedValue"/>
                <button class="btn btn-light border" tabindex="0" role="button" aria-expanded="true" wicket:id="showHideLanguagesLocalized" wicket:message="title:PolyStringEditorPanel.editTranslation">
                    <div>
                        <i class="fa fa-language"/>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div wicket:id="originValueContainer">
        <div class="col-3" wicket:id="originValueLabel"/>
        <div wicket:id="origValueWithButtonContainer">
            <div wicket:id="origValueWithButton" class="input-group input-group-sm">
                <wicket:container wicket:id="origValue"/>
                <button class="btn btn-light border" tabindex="0" role="button" aria-expanded="false" wicket:id="showHideLanguagesOrig" wicket:message="title:PolyStringEditorPanel.editTranslation">
                    <div>
                        <i class="fa fa-language"/>
                    </div>
                </button>
            </div>
        </div>
    </div>
    <wicket:container wicket:id="fullDataContainer">
        <div class="property-stripe">
            <div class="row g-0 prism-property">
                <div class="col-3" wicket:id="keyValueLabel"/>
                <div class="col-9" wicket:id="keyValue"/>
            </div>
        </div>
        <div class="property-stripe" wicket:id="languageEditor">
            <div class="row g-0 prism-property">
                <div class="col-12 d-flex align-items-center">
                    <label wicket:id="languageListLabel" class="col-3 ps-0 fw-normal mb-0">
                        <wicket:message key="PolyStringEditorPanel.language"/>
                    </label>
                    <div wicket:message="aria-label:PolyStringEditorPanel.language" class="col-3 px-0" wicket:id="languagesList"/>

                    <label wicket:id="valueToAddLabel" class="ps-4 pe-2 fw-normal mb-0">
                        <wicket:message key="PolyStringEditorPanel.languageKey"/>
                    </label>
                    <div class="flex-fill" wicket:id="valueToAdd"/>

                    <a class="btn btn-tool" wicket:id="addLanguageValue"
                            wicket:message="title:PolyStringEditorPanel.addLanguageValue">
                        <i class="fa fa-plus-circle"/>
                    </a>
                </div>
            </div>
        </div>
        <div class="property-stripe" wicket:id="languagesRepeater">
            <div class="row g-0 prism-property">
                <div class="col-12 d-flex align-items-center">
                    <label wicket:id="languageNameLabel" class="col-3 ps-0 fw-normal mb-0">
                        <wicket:message key="PolyStringEditorPanel.language"/>
                    </label>
                    <div class="col-3 px-0" wicket:id="languageName"/>
                    <label wicket:id="translationLabel" class="ps-4 pe-2 fw-normal mb-0">
                        <wicket:message key="PolyStringEditorPanel.languageKey"/>
                    </label>
                    <div class="flex-fill" wicket:id="translation"/>
                    <a class="btn btn-tool" wicket:id="removeLanguageButton" wicket:message="title:PolyStringEditorPanel.removeLanguageButton">
                        <i class="fa fa-minus-circle"/></a>
                </div>
            </div>
        </div>
    </wicket:container>
</wicket:panel>
</html>

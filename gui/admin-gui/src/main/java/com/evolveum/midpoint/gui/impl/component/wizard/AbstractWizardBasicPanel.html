<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <div class="d-flex flex-column gap-3 align-items-center mt-5">
        <div class="mb-3">
            <ol class="breadcrumb p-0 bg-transparent m-0">
                <li class="breadcrumb-item" wicket:id="breadcrumb">
                    <i wicket:id="bcIcon"></i>&nbsp;
                    <span wicket:id="bcName"></span>
                </li>
            </ol>
        </div>

        <i class="text-center mb-1 fw-bold fa-xl" wicket:id="titleIcon"></i>
        <h2 class="text-center mb-1 fw-bold" wicket:id="text"></h2>
        <wicket:enclosure child="subText">
            <div class="text-center text-secondary mb-5 col-3xl-8 col-10 lh-2 h5">
                <span wicket:id="subText"></span>
                <a wicket:id="subTextMore"></a>
            </div>
        </wicket:enclosure>

        <div class="col-12">
            <div wicket:id="feedbackContainer" class="feedbackContainer mx-auto p-0">
                <div wicket:id="feedback" class="messagePanel"></div>
            </div>
            <wicket:child/>
        </div>
        <div class="d-flex mt-5 gap-3 justify-content-center" wicket:id="buttonsContainer"></div>
    </div>


    <wicket:fragment wicket:id="buttonFragment">
        <div wicket:id="backContainer" class="wizard-actions-container">
            <a class="btn btn-outline-primary" wicket:id="back"></a>
        </div>

        <div wicket:id="exitContainer" class="wizard-actions-container">
            <a class="btn btn-link" wicket:id="exit"></a>
        </div>

        <div wicket:id="customButtonsContainer" class="wizard-actions-container gap-2">
            <a class="btn" wicket:id="buttons"></a>
        </div>
    </wicket:fragment>
</wicket:panel>
</body>
</html>

<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:extend>
    <div wicket:id="feedbackContainer" class="col-12 feedbackContainer">
        <div wicket:id="feedback" class="messagePanel"/>
    </div>
    <div class="col-12 gen-list-group">
        <div class="d-flex flex-row gen-list-item" wicket:id="panel">
            <div class="h-100 m-auto pr-3">
                <div wicket:id="check"/>
            </div>
            <div class="w-100 d-flex flex-column">
                <div class="d-lex flex-row">
                    <div class="d-inline" wicket:id="name"/>
                    <span wicket:id="recommendedBadge" class="ml-2 badge badge-info">Recommended</span>
                </div>
                <div class="text-sm text-secondary" wicket:id="description"/>
            </div>
        </div>
    </div>
    <div class="col-12 mt-3 text-center">
        <a wicket:id="showAll" class="btn btn-link">Show all options</a>
        <a wicket:id="hideAll" class="btn btn-link">Hide not recommended options</a>
    </div>
</wicket:extend>
</html>

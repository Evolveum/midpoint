<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div class="catalog-tile-panel d-flex w-100">
        <div class="logo d-flex justify-content-center me-2"
                style="border-radius: 10px; height: 48px; min-height: 48px; min-width: 48px; width: 48px;">
            <i class="text-info align-self-center" wicket:id="icon"/>
        </div>
        <div class="catalog-tile-panel d-flex flex-column flex-fill">
            <div class="d-flex">
                <span class="small text-secondary fw-bold text-break me-auto" wicket:id="title"/>
                <span class="small text-center badge bg-danger ms-auto" wicket:id="tag"/>
            </div>
            <span class="small mt-1 text-secondary tile-description text-start" wicket:id="description" style="-webkit-line-clamp: 2;"/>
        </div>
    </div>
</wicket:panel>
</html>

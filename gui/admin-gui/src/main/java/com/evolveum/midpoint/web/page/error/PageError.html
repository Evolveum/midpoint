<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:head>
    <style>
        .app-main, .right-side, .app-footer, .app-header {
            margin-left: 0px !important;

            -moz-transition: none !important;;
            -webkit-transition: none !important;;
            -o-transition: color 0 ease-in !important;;
            transition: none !important;;
        }
    </style>
</wicket:head>
<wicket:extend>
    <div class="mp-error-page w-100 d-sm-flex align-items-sm-start justify-content-center gap-sm-5 px-2" role="region">
        <h2 class="display-1 fw-bold text-danger mt-sm-4" wicket:id="code">500</h2>
        <div class="mp-error-content flex-sm-grow-1">
            <h3 class="fs-2 fw-medium mt-4 text-center text-sm-start">
                <i class="fa fa-exclamation-triangle text-danger"></i>
                <span wicket:id="label">Unexpected error</span>
            </h3>
            <p>
            <div wicket:id="errorMessage"/>
            </p>
            <p wicket:id="message"/>
            <div class="d-flex justify-content-end">
                <div class="main-button-bar">
                    <a class="btn btn-primary" wicket:id="home"/>
                    <a class="btn btn-primary" wicket:id="back"/>
                </div>
            </div>
        </div>
    </div>
</wicket:extend>
</body>
</html>

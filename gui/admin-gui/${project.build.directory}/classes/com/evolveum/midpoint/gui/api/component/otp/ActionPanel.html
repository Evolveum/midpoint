<html xmlns="http://www.w3.org/1999/xhtml"
        xmlns:wicket="http://wicket.apache.org">
<body>
<wicket:panel>
    <div class="d-flex gap-4">
        <a wicket:id="edit" class="text-info">
            <i class="fa fa-pen-to-square"/>
            <wicket:message key="ActionPanel.edit"/>
        </a>
        <a wicket:id="delete" class="text-danger">
            <i class="fa fa-trash"/>
            <wicket:message key="ActionPanel.delete"/>
        </a>
    </div>
</wicket:panel>
</body>
</html>

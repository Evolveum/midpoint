<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <wicket:extend>
        <fieldset class="objectButtons d-flex flex-column align-items-start" wicket:id="resourceOperationsContainer">
            <legend>
                <wicket:message key="ResourceOperationalButtonsPanel.buttons.resource"/>
            </legend>
            <div class="d-flex flex-wrap gap-1">
                <a class="me-2 btn btn-light border btn-sm" wicket:id="resourceButtons"/>
            </div>
        </fieldset>
        <wicket:enclosure child="lifecycleStatePanel">
            <fieldset class="objectButtons d-flex flex-column align-items-start">
                <legend>
                    <wicket:message key="ObjectType.lifecycleState"/>
                </legend>
                <div class="d-flex flex-wrap gap-1">
                    <div class="me-2" wicket:id="lifecycleStatePanel"/>
                    <a class="me-2 btn btn-light border btn-sm" wicket:id="detailedLifecycle"/>
                </div>
            </fieldset>
        </wicket:enclosure>
    </wicket:extend>
</wicket:panel>
</html>

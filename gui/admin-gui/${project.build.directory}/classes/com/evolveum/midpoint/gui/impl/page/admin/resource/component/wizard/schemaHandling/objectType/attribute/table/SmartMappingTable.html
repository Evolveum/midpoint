<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div wicket:id="table"></div>

    <wicket:fragment wicket:id="legendFragment">
        <div wicket:id="legend" class="d-flex align-items-center flex-wrap text-muted py-1 ps-3 border-start">
            <span class="me-3" wicket:id="legendTitle"></span>

            <span class="d-inline-flex align-items-center me-3">
                        <span wicket:id="aiLegend"></span>
                    </span>

            <span class="d-inline-flex align-items-center">
                    <span wicket:id="systemLegend"></span>
                </span>
        </div>
    </wicket:fragment>
</wicket:panel>
</html>

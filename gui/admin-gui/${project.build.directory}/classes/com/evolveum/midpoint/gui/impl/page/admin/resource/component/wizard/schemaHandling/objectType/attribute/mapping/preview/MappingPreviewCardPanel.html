<!DOCTYPE html>
<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <div wicket:id="card">
        <div class="d-flex align-items-center justify-content-between">
            <div class="d-flex align-items-center">
                <span wicket:id="strengthIcon" class="fa-xl me-3"></span>
                <span wicket:id="strengthLabel" class="mb-0 me-5" style="font-size:14px"></span>

                <div class="me-5">
                    <div class="text-muted fw-semibold" style="font-size:14px">
                        <wicket:message key="MappingPreviewCardPanel.source"/>
                    </div>
                    <div wicket:id="sourceValue" class="mb-0" style="font-size:15px"></div>
                </div>

                <div class="text-muted me-5">
                    <i class="fa fa-arrow-right"></i>
                </div>

                <div>
                    <div class="text-muted fw-semibold" style="font-size:14px">
                        <wicket:message key="MappingPreviewCardPanel.target"/>
                    </div>
                    <div wicket:id="targetValue" class="mb-0" style="font-size:15px"></div>
                </div>
            </div>

            <span wicket:id="aiIcon"></span>
        </div>
    </div>
</wicket:panel>
</html>

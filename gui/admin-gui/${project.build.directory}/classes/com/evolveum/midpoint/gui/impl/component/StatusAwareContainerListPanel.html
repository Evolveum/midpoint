<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>

    <div wicket:id="noValuePanel"></div>

    <div wicket:id="itemsTable"></div>
    <wicket:fragment wicket:id="buttonBar">
        <div wicket:id="buttonsRepeater">
            <a wicket:id="button"></a>
        </div>
    </wicket:fragment>
    <wicket:child />
    <wicket:fragment wicket:id="statusHeader">
        <div class="d-flex justify-content-between align-items-center">
            <div wicket:id="showSuggestions"></div>

            <a wicket:id="createNew"></a>
        </div>
    </wicket:fragment>
</wicket:panel>
</html>

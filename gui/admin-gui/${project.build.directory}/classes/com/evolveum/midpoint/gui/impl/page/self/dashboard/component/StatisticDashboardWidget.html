<html xmlns:wicket="http://wicket.apache.org">
<wicket:panel>
    <button href="#" wicket:id="link" class="btn btn-none p-0 w-100">
        <div class="info-box shadow-sm border mb-0 shadow-sm btn btn-light">
            <div>
                <div class="info-box-icon d-inline-flex h-100" wicket:id="imageId"/>
            </div>

            <div class="info-box-content justify-content-start">
                <span class="info-box-number text-start" wicket:id="labelId"/>
                <span class="info-box-text text-start" wicket:id="descriptionId"/>
                <span class="info-box-text text-start" wicket:id="statisticData"/>
            </div>
        </div>
    </button>
</wicket:panel>
</html>
